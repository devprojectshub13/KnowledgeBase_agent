services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agent-vector-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentvector
    ports:
      - "9432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentvector"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
